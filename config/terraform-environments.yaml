# Central Terraform deployment config (RCM-style single source of truth).
#
# - environments.*.git_branch — matches github.ref_name / github.base_ref for GCP (and AWS dev) workflows.
# - gcp — project and GCS state bucket for that branch.
# - tf_environment — passed as TF_VAR_environment and used in state prefix segments.
#
# AWS account IDs (friendly names → account number) for reference / parity with RCM tenants.yaml.
# Prod Terraform matrix: aws.prod_terraform_matrix (one apply/plan per row, parallel).
#
# GitHub repo Variables still required: GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT_EMAIL.
# Optional: AWS_ROLE_ARN_DEV if environments.dev.aws.role_arn is empty.

version: 1

default_aws_region: ap-southeast-2

aws_accounts:
  management: "935969326135"
  cohort1: "211125324898"
  cohort2: "043309367276"
  cohort3: "471112541316"
  development: "432534569171"

environments:
  dev:
    git_branch: dev
    tf_environment: dev
    gcp:
      project_id: anomaly-detection-dev-496103
      state_bucket: anomaly-detection-dev-496103-terraform-state
    aws:
      # Set IAM role ARN for GitHub OIDC on branch dev, or leave empty and use repo variable AWS_ROLE_ARN_DEV.
      role_arn: ""

  prod:
    git_branch: main
    tf_environment: prod
    gcp:
      project_id: anomaly-detection-496003
      state_bucket: anomaly-detection-496003-terraform-state

aws:
  prod_terraform_matrix:
    - key: management
      role_arn: arn:aws:iam::935969326135:role/REPLACE_WITH_GITHUB_OIDC_ROLE
    - key: cohort1
      role_arn: arn:aws:iam::211125324898:role/REPLACE_WITH_GITHUB_OIDC_ROLE
    - key: cohort2
      role_arn: arn:aws:iam::043309367276:role/REPLACE_WITH_GITHUB_OIDC_ROLE
    - key: cohort3
      role_arn: arn:aws:iam::471112541316:role/REPLACE_WITH_GITHUB_OIDC_ROLE
