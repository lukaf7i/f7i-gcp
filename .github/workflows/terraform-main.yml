# GCP Terraform — applies on push to `dev` (dev project + state prefix) or `main` (prod project + prefix).
#
# Prerequisites (GitHub → Settings → Secrets and variables → Actions → Variables):
#   GCP_TF_STATE_BUCKET_DEV       e.g. anomaly-detection-dev-496103-terraform-state (dev state lives here)
#   GCP_TF_STATE_BUCKET_PROD      e.g. anomaly-detection-496003-terraform-state (prod state; optional if unused)
#   GCP_TF_STATE_BUCKET           fallback if DEV/PROD bucket vars not set (legacy single bucket)
#   GCP_WORKLOAD_IDENTITY_PROVIDER
#   GCP_SERVICE_ACCOUNT_EMAIL     — must access both projects + both state buckets as needed
#   GCP_PROJECT_ID_DEV            — dev GCP project (resources), e.g. anomaly-detection-dev-496103
#   GCP_PROJECT_ID_PROD           — prod GCP project ID
#   GCP_PROJECT_ID                — optional fallback if DEV/PROD project vars omitted
#
# GitHub Environments (optional): only `terraform-apply-dev` and `terraform-apply-prod` for this repo (GCP + AWS).
# WIF in GCP must allow repository `f7i-ai/f7i-gcp` (attribute.repository) per branch if you restrict claims.
#
# Local state is not used; backend is always GCS.

name: Terraform GCP (apply)

on:
  push:
    branches:
      - dev
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-main.yml"
  workflow_dispatch:

concurrency:
  group: terraform-gcp-${{ github.repository }}-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'terraform-apply-prod' || 'terraform-apply-dev' }}
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Map branch → GCP project, state bucket, and Terraform environment
        env:
          REF_NAME: ${{ github.ref_name }}
          PROJ_DEV: ${{ vars.GCP_PROJECT_ID_DEV || vars.GCP_PROJECT_ID }}
          PROJ_PROD: ${{ vars.GCP_PROJECT_ID_PROD || vars.GCP_PROJECT_ID }}
          BUCKET_DEV: ${{ vars.GCP_TF_STATE_BUCKET_DEV || vars.GCP_TF_STATE_BUCKET }}
          BUCKET_PROD: ${{ vars.GCP_TF_STATE_BUCKET_PROD || vars.GCP_TF_STATE_BUCKET }}
        run: |
          if [ "$REF_NAME" = "main" ]; then
            echo "TF_ENV=prod" >> "$GITHUB_ENV"
            echo "TF_VAR_project_id=${PROJ_PROD}" >> "$GITHUB_ENV"
            echo "TF_VAR_environment=prod" >> "$GITHUB_ENV"
            echo "GCP_TF_STATE_BUCKET=${BUCKET_PROD}" >> "$GITHUB_ENV"
          else
            echo "TF_ENV=dev" >> "$GITHUB_ENV"
            echo "TF_VAR_project_id=${PROJ_DEV}" >> "$GITHUB_ENV"
            echo "TF_VAR_environment=dev" >> "$GITHUB_ENV"
            echo "GCP_TF_STATE_BUCKET=${BUCKET_DEV}" >> "$GITHUB_ENV"
          fi

      - name: Require configuration
        env:
          PROJ: ${{ github.ref_name == 'main' && (vars.GCP_PROJECT_ID_PROD || vars.GCP_PROJECT_ID) || (vars.GCP_PROJECT_ID_DEV || vars.GCP_PROJECT_ID) }}
          WIF: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          SA: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}
          BUCKET_RESOLVED: ${{ github.ref_name == 'main' && (vars.GCP_TF_STATE_BUCKET_PROD || vars.GCP_TF_STATE_BUCKET) || (vars.GCP_TF_STATE_BUCKET_DEV || vars.GCP_TF_STATE_BUCKET) }}
        run: |
          ok=1
          [ -n "$BUCKET_RESOLVED" ] || { echo "Set GCP_TF_STATE_BUCKET_DEV and GCP_TF_STATE_BUCKET_PROD (or GCP_TF_STATE_BUCKET fallback)"; ok=0; }
          [ -n "$WIF" ] || { echo "Missing GCP_WORKLOAD_IDENTITY_PROVIDER"; ok=0; }
          [ -n "$SA" ] || { echo "Missing GCP_SERVICE_ACCOUNT_EMAIL"; ok=0; }
          [ -n "$PROJ" ] || { echo "Missing GCP project (set GCP_PROJECT_ID_DEV / GCP_PROJECT_ID_PROD or GCP_PROJECT_ID)"; ok=0; }
          [ "$ok" -eq 1 ] || exit 1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Refuse local state files in workspace
        run: |
          shopt -s nullglob
          files=( *.tfstate* )
          if [ ${#files[@]} -gt 0 ]; then
            echo "terraform.tfstate* must not be present; state must stay in GCS only."
            ls -la "${files[@]}"
            exit 1
          fi

      - name: Terraform Init
        env:
          GCP_TF_STATE_BUCKET: ${{ env.GCP_TF_STATE_BUCKET }}
        run: |
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${GCP_TF_STATE_BUCKET}" \
            -backend-config="prefix=terraform/gcp/${TF_ENV}"

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve -no-color

      - name: Confirm no local state was written
        run: test ! -f terraform.tfstate && test ! -f terraform.tfstate.backup
