# GCP Terraform — applies on push to `dev` (dev project + state prefix) or `main` (prod project + prefix).
# `workflow_dispatch`: run from `dev` → dev apply; from `main` → prod apply.
#
# Cloud targets (projects, state buckets) live in `config/terraform-environments.yaml` (RCM-style central config).
# Resolver: `scripts/ci/terraform-from-config.rb gcp-resolve <git_branch>`.
#
# GitHub → Actions → Variables (identity only):
#   GCP_WORKLOAD_IDENTITY_PROVIDER
#   GCP_SERVICE_ACCOUNT_EMAIL  — must access both GCP projects + both state buckets used in the YAML
#
# GitHub Environments (optional): `terraform-apply-dev` and `terraform-apply-prod` for these GCP jobs.
# (Same names are used when AWS workflows are re-enabled.)
# WIF in GCP must allow repository `f7i-ai/f7i-gcp` (attribute.repository) per branch if you restrict claims.
#
# Local state is not used; backend is always GCS.

name: Terraform GCP (apply)

on:
  push:
    branches:
      - dev
      - main
    paths:
      - "terraform/**"
      - "config/**"
      - "scripts/ci/terraform-from-config.rb"
      - ".github/workflows/terraform-main.yml"
  workflow_dispatch:

concurrency:
  group: terraform-gcp-${{ github.repository }}-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'terraform-apply-prod' || 'terraform-apply-dev' }}
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Resolve GCP targets from config
        env:
          REF_NAME: ${{ github.ref_name }}
        run: ruby "$GITHUB_WORKSPACE/scripts/ci/terraform-from-config.rb" gcp-resolve "$REF_NAME"

      - name: Require configuration
        env:
          WIF: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          SA: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}
        run: |
          ok=1
          [ -n "${GCP_TF_STATE_BUCKET:-}" ] || { echo "Missing state bucket (config/terraform-environments.yaml → gcp.state_bucket)"; ok=0; }
          [ -n "${TF_VAR_project_id:-}" ] || { echo "Missing project_id (config/terraform-environments.yaml → gcp.project_id)"; ok=0; }
          [ -n "$WIF" ] || { echo "Missing GCP_WORKLOAD_IDENTITY_PROVIDER"; ok=0; }
          [ -n "$SA" ] || { echo "Missing GCP_SERVICE_ACCOUNT_EMAIL"; ok=0; }
          [ "$ok" -eq 1 ] || exit 1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Refuse local state files in workspace
        run: |
          shopt -s nullglob
          files=( *.tfstate* )
          if [ ${#files[@]} -gt 0 ]; then
            echo "terraform.tfstate* must not be present; state must stay in GCS only."
            ls -la "${files[@]}"
            exit 1
          fi

      - name: Terraform Init
        env:
          GCP_TF_STATE_BUCKET: ${{ env.GCP_TF_STATE_BUCKET }}
        run: |
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${GCP_TF_STATE_BUCKET}" \
            -backend-config="prefix=terraform/gcp/${TF_ENV}"

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve -no-color

      - name: Confirm no local state was written
        run: test ! -f terraform.tfstate && test ! -f terraform.tfstate.backup
