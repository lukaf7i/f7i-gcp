# TEMPORARILY DISABLED (auto-triggers) — validate GCP first. Uncomment `push` under `on:` to re-enable.
# ============================================================================
# Runs when `dev` is updated (including after a PR is merged into `dev`): apply Terraform to the
# AWS **dev** account using environment `dev`. Optional manual run: Actions → Terraform AWS (dev apply).
#
# --- Connect GitHub → AWS dev account (OIDC; no static keys) ---
# 1) IAM → Identity providers: add `https://token.actions.githubusercontent.com` if missing
#    (audience: `sts.amazonaws.com`).
# 2) IAM role trust policy (example; set DEV_ACCOUNT_ID; repo is f7i-ai/f7i-gcp):
#    {
#      "Effect": "Allow",
#      "Principal": { "Federated": "arn:aws:iam::DEV_ACCOUNT_ID:oidc-provider/token.actions.githubusercontent.com" },
#      "Action": "sts:AssumeRoleWithWebIdentity",
#      "Condition": {
#        "StringEquals": { "token.actions.githubusercontent.com:aud": "sts.amazonaws.com" },
#        "StringLike": { "token.actions.githubusercontent.com:sub": "repo:f7i-ai/f7i-gcp:ref:refs/heads/dev" }
#      }
#    }
# 3) Attach IAM policy allowing what this Terraform stack needs (iterate from least privilege).
# 4) `environments.dev.aws.role_arn` in config/terraform-environments.yaml, or GitHub variable AWS_ROLE_ARN_DEV
#
# --- State in GCS ---
# Dev state bucket: `config/terraform-environments.yaml` → environments.dev.gcp.state_bucket (by git branch).
# Identity: GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT_EMAIL
#
# GitHub Environment `terraform-apply-dev` (shared with GCP dev apply; optional protection rules).
#
# Prod: push to `main` runs `.github/workflows/terraform-aws-prod-deploy.yml` (matrix from
# `config/terraform-environments.yaml` → aws.prod_terraform_matrix).

name: Terraform AWS (dev apply)

on:
  workflow_dispatch:
  # push:
  #   branches:
  #     - dev
  #   paths:
  #     - "aws/terraform/**"
  #     - "config/**"
  #     - "scripts/ci/terraform-from-config.rb"
  #     - ".github/workflows/terraform-aws-deploy.yml"

concurrency:
  group: terraform-aws-apply-dev-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: terraform-apply-dev
    defaults:
      run:
        working-directory: aws/terraform

    steps:
      - uses: actions/checkout@v4

      - name: Resolve AWS dev role and GCS state bucket (from config)
        env:
          AWS_ROLE_ARN_DEV: ${{ vars.AWS_ROLE_ARN_DEV }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          echo "TF_ENV=dev" >> "$GITHUB_ENV"
          echo "TF_VAR_environment=dev" >> "$GITHUB_ENV"
          R="$(ruby "$GITHUB_WORKSPACE/scripts/ci/terraform-from-config.rb" aws-dev-role)"
          echo "AWS_ROLE_TO_ASSUME=${R}" >> "$GITHUB_ENV"
          B="$(ruby "$GITHUB_WORKSPACE/scripts/ci/terraform-from-config.rb" gcp-state-bucket "$REF_NAME")"
          echo "GCP_TF_STATE_BUCKET=${B}" >> "$GITHUB_ENV"

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION || 'ap-southeast-2' }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Refuse local state files in workspace
        run: |
          shopt -s nullglob
          files=( *.tfstate* )
          if [ ${#files[@]} -gt 0 ]; then
            echo "terraform.tfstate* must not be present; state must stay in GCS only."
            ls -la "${files[@]}"
            exit 1
          fi

      - name: Require GCS state bucket
        run: |
          if [ -z "${GCP_TF_STATE_BUCKET:-}" ]; then
            echo "Missing dev state bucket in config/terraform-environments.yaml (environments.dev.gcp.state_bucket)."
            exit 1
          fi

      - name: Terraform Init
        run: |
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${GCP_TF_STATE_BUCKET}" \
            -backend-config="prefix=terraform/aws/${TF_ENV}"

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve -no-color

      - name: Confirm no local state was written
        run: |
          if [ -f terraform.tfstate ] || [ -f terraform.tfstate.backup ]; then
            echo "Local state file present after apply; GCS backend must be used exclusively."
            exit 1
          fi
