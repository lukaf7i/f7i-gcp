# Runs when `dev` is updated (including after a PR is merged into `dev`): apply Terraform to the
# AWS **dev** account using environment `dev`. Optional manual run: Actions → Terraform AWS (dev apply).
#
# --- Connect GitHub → AWS dev account (OIDC; no static keys) ---
# 1) IAM → Identity providers: add `https://token.actions.githubusercontent.com` if missing
#    (audience: `sts.amazonaws.com`).
# 2) IAM role trust policy (example; replace OWNER/REPO and account id):
#    {
#      "Effect": "Allow",
#      "Principal": { "Federated": "arn:aws:iam::DEV_ACCOUNT_ID:oidc-provider/token.actions.githubusercontent.com" },
#      "Action": "sts:AssumeRoleWithWebIdentity",
#      "Condition": {
#        "StringEquals": { "token.actions.githubusercontent.com:aud": "sts.amazonaws.com" },
#        "StringLike": { "token.actions.githubusercontent.com:sub": "repo:OWNER/REPO:ref:refs/heads/dev" }
#      }
#    }
# 3) Attach IAM policy allowing what this Terraform stack needs (iterate from least privilege).
# 4) GitHub repo variable: AWS_ROLE_ARN_DEV = arn:aws:iam::DEV_ACCOUNT_ID:role/your-role
#
# --- State in GCS (billing / bucket fixed in GCP) ---
# Same variables as GCP Terraform workflows:
#   GCP_TF_STATE_BUCKET_DEV (or GCP_TF_STATE_BUCKET), GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT_EMAIL
# State prefix: terraform/aws/dev (only dev applies run from this workflow).
#
# GitHub Environment `terraform-apply-dev` (shared with GCP dev apply; optional protection rules).
#
# Prod: push to `main` runs `.github/workflows/terraform-aws-prod-deploy.yml` (matrix over
# aws/config/prod-accounts.json), not this workflow.

name: Terraform AWS (dev apply)

on:
  push:
    branches:
      - dev
    paths:
      - "aws/terraform/**"
      - ".github/workflows/terraform-aws-deploy.yml"
  workflow_dispatch:

concurrency:
  group: terraform-aws-apply-dev-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: terraform-apply-dev
    defaults:
      run:
        working-directory: aws/terraform

    steps:
      - uses: actions/checkout@v4

      - name: Select AWS dev role and Terraform env
        env:
          ROLE_ARN: ${{ vars.AWS_ROLE_ARN_DEV }}
        run: |
          if [ -z "${ROLE_ARN}" ]; then
            echo "Set repository variable AWS_ROLE_ARN_DEV to the IAM role ARN for GitHub OIDC on branch dev."
            exit 1
          fi
          echo "TF_ENV=dev" >> "$GITHUB_ENV"
          echo "TF_VAR_environment=dev" >> "$GITHUB_ENV"
          echo "AWS_ROLE_TO_ASSUME=${ROLE_ARN}" >> "$GITHUB_ENV"

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION || 'ap-southeast-2' }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Refuse local state files in workspace
        run: |
          shopt -s nullglob
          files=( *.tfstate* )
          if [ ${#files[@]} -gt 0 ]; then
            echo "terraform.tfstate* must not be present; state must stay in GCS only."
            ls -la "${files[@]}"
            exit 1
          fi

      - name: Require GCS state bucket
        env:
          GCP_TF_STATE_BUCKET: ${{ vars.GCP_TF_STATE_BUCKET_DEV || vars.GCP_TF_STATE_BUCKET }}
        run: |
          if [ -z "${GCP_TF_STATE_BUCKET}" ]; then
            echo "Set GCP_TF_STATE_BUCKET_DEV (or GCP_TF_STATE_BUCKET)."
            exit 1
          fi

      - name: Terraform Init
        env:
          GCP_TF_STATE_BUCKET: ${{ vars.GCP_TF_STATE_BUCKET_DEV || vars.GCP_TF_STATE_BUCKET }}
        run: |
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${GCP_TF_STATE_BUCKET}" \
            -backend-config="prefix=terraform/aws/${TF_ENV}"

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve -no-color

      - name: Confirm no local state was written
        run: |
          if [ -f terraform.tfstate ] || [ -f terraform.tfstate.backup ]; then
            echo "Local state file present after apply; GCS backend must be used exclusively."
            exit 1
          fi
