name: Terraform (prod)

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - "functions/**"
      - "containers/**"
      - "lambdas/**"
      - ".github/workflows/terraform-prod.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  apply:
    name: Terraform apply (prod ${{ matrix.cohort }})
    runs-on: ubuntu-latest
    # Per-cohort concurrency: cohort0 applies don't block cohort1, etc.
    # A second push to main while a cohort is mid-apply is queued (cancel-in-progress=false).
    concurrency:
      group: terraform-prod-${{ matrix.cohort }}-${{ github.repository }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        # TEMP: restricted to cohort0 (arnotts) only for the first prod deploy
        # test. After cohort0 is verified end-to-end, restore the other three
        # entries below.
        include:
          - cohort: cohort0  # arnotts
            aws_role_arn: arn:aws:iam::935969326135:role/f7i-gcp-github-terraform
          # - cohort: cohort1
          #   aws_role_arn: arn:aws:iam::211125324898:role/f7i-gcp-github-terraform
          # - cohort: cohort2
          #   aws_role_arn: arn:aws:iam::043309367276:role/f7i-gcp-github-terraform
          # - cohort: cohort3  # darrel lea
          #   aws_role_arn: arn:aws:iam::471112541316:role/f7i-gcp-github-terraform
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ matrix.aws_role_arn }}
          aws-region: ${{ vars.AWS_REGION || 'ap-southeast-2' }}

      - run: terraform init -input=false -reconfigure -backend-config="$GITHUB_WORKSPACE/terraform/env/gcp-prod-${{ matrix.cohort }}.backend.hcl"

      - run: terraform apply -input=false -auto-approve -no-color -var-file="$GITHUB_WORKSPACE/terraform/env/prod-${{ matrix.cohort }}.tfvars"
