# Unified Terraform plan on PRs — same root as apply workflow.

name: Terraform (PR)

on:
  pull_request:
    branches:
      - main
      - dev
    paths:
      - "terraform/**"
      - "functions/**"
      - ".github/workflows/terraform-pr.yml"

concurrency:
  group: terraform-pr-${{ github.repository }}-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

# Opt JS-based actions onto Node.js 24 ahead of the June 2026 default flip
# (see terraform-prod.yml for the rationale).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Select env files
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          WS="$GITHUB_WORKSPACE"
          if [ "$BASE_REF" = "main" ]; then
            # Prod is four cohort states. Plan against cohort0 (arnotts) as
            # the representative — apply (matrix) covers all four.
            echo "TFVARS_FILE=$WS/terraform/env/prod-cohort0.tfvars"           >> "$GITHUB_ENV"
            echo "BACKEND_FILE=$WS/terraform/env/gcp-prod-cohort0.backend.hcl" >> "$GITHUB_ENV"
            echo "AWS_ROLE=arn:aws:iam::935969326135:role/f7i-gcp-github-terraform" >> "$GITHUB_ENV"
          else
            echo "TFVARS_FILE=$WS/terraform/env/dev.tfvars"            >> "$GITHUB_ENV"
            echo "BACKEND_FILE=$WS/terraform/env/gcp-dev.backend.hcl"  >> "$GITHUB_ENV"
            echo "AWS_ROLE=${{ vars.AWS_ROLE_ARN_DEV }}"               >> "$GITHUB_ENV"
          fi

      - name: Require configuration
        env:
          WIF: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          SA:  ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}
        run: |
          ok=1
          [ -f "${TFVARS_FILE}"  ] || { echo "Missing $TFVARS_FILE";  ok=0; }
          [ -f "${BACKEND_FILE}" ] || { echo "Missing $BACKEND_FILE"; ok=0; }
          [ -n "$WIF"            ] || { echo "Missing GCP_WORKLOAD_IDENTITY_PROVIDER"; ok=0; }
          [ -n "$SA"             ] || { echo "Missing GCP_SERVICE_ACCOUNT_EMAIL";      ok=0; }
          [ -n "$AWS_ROLE"       ] || { echo "Missing AWS_ROLE / AWS_ROLE_ARN_DEV"; ok=0; }
          [ "$ok" -eq 1 ] || exit 1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE }}
          aws-region: ${{ vars.AWS_REGION || 'ap-southeast-2' }}

      - name: Terraform Format (check)
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -input=false -reconfigure -backend-config="$BACKEND_FILE"

      - name: Terraform Validate
        run: terraform validate -var-file="$TFVARS_FILE"

      - name: Terraform Plan
        run: terraform plan -input=false -no-color -var-file="$TFVARS_FILE"
