# Plans on PRs targeting `dev` or `main` with the matching GCP project and state prefix from
# `config/terraform-environments.yaml` (`scripts/ci/terraform-from-config.rb gcp-resolve <base_ref>`).
#
# GitHub Variables: GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT_EMAIL. Repo: f7i-ai/f7i-gcp.

name: Terraform GCP (PR)

on:
  pull_request:
    branches:
      - main
      - dev
    paths:
      - "terraform/**"
      - "config/**"
      - "scripts/ci/terraform-from-config.rb"
      - ".github/workflows/terraform-pr.yml"

concurrency:
  group: terraform-gcp-pr-${{ github.repository }}-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Resolve GCP targets from config
        env:
          BASE_REF: ${{ github.base_ref }}
        run: ruby "$GITHUB_WORKSPACE/scripts/ci/terraform-from-config.rb" gcp-resolve "$BASE_REF"

      - name: Require configuration
        env:
          WIF: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          SA: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}
        run: |
          ok=1
          [ -n "${GCP_TF_STATE_BUCKET:-}" ] || { echo "Missing state bucket (config/terraform-environments.yaml → gcp.state_bucket)"; ok=0; }
          [ -n "${TF_VAR_project_id:-}" ] || { echo "Missing project_id (config/terraform-environments.yaml → gcp.project_id)"; ok=0; }
          [ -n "$WIF" ] || { echo "Missing GCP_WORKLOAD_IDENTITY_PROVIDER"; ok=0; }
          [ -n "$SA" ] || { echo "Missing GCP_SERVICE_ACCOUNT_EMAIL"; ok=0; }
          [ "$ok" -eq 1 ] || exit 1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Refuse local state files in workspace
        run: |
          shopt -s nullglob
          files=( *.tfstate* )
          if [ ${#files[@]} -gt 0 ]; then
            echo "terraform.tfstate* must not be present; state must stay in GCS only."
            ls -la "${files[@]}"
            exit 1
          fi

      - name: Terraform Format (check)
        run: terraform fmt -check -recursive

      - name: Terraform Init
        env:
          GCP_TF_STATE_BUCKET: ${{ env.GCP_TF_STATE_BUCKET }}
        run: |
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${GCP_TF_STATE_BUCKET}" \
            -backend-config="prefix=terraform/gcp/${TF_ENV}"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false -no-color -out=tfplan.binary

      - name: Show plan (text summary)
        run: terraform show -no-color tfplan.binary

      - name: Confirm no local state was written
        run: test ! -f terraform.tfstate && test ! -f terraform.tfstate.backup
