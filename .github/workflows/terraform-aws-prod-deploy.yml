# ============================================================================
# TEMPORARILY DISABLED (auto-triggers) — validate GCP first. Uncomment `push` under `on:` to re-enable.
# ============================================================================
# Push to `main` → one Terraform apply per entry in config/terraform-environments.yaml `aws.prod_terraform_matrix` (parallel matrix).
# Each row uses its own IAM role (GitHub OIDC trust: repo:f7i-ai/f7i-gcp:ref:refs/heads/main) and GCS prefix
#   terraform/aws/prod/<key>/
#
# Edit the YAML matrix: stable `key` → `role_arn` in each prod account.
#
# GCS state: prod bucket from `config/terraform-environments.yaml` (environments.prod.gcp.state_bucket) via init step.
# GitHub variables: GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT_EMAIL (GCS access).

name: Terraform AWS (prod apply)

on:
  workflow_dispatch:
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - "aws/terraform/**"
  #     - "config/**"
  #     - "scripts/ci/terraform-from-config.rb"
  #     - ".github/workflows/terraform-aws-prod-deploy.yml"

permissions:
  contents: read
  id-token: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Load prod account matrix
        id: set-matrix
        run: |
          echo "matrix<<MATRIX_EOF" >> "$GITHUB_OUTPUT"
          ruby "$GITHUB_WORKSPACE/scripts/ci/terraform-from-config.rb" aws-prod-matrix >> "$GITHUB_OUTPUT"
          echo "MATRIX_EOF" >> "$GITHUB_OUTPUT"

  apply:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    environment: terraform-apply-prod
    concurrency:
      group: terraform-aws-prod-${{ matrix.key }}-${{ github.repository }}
      cancel-in-progress: false

    defaults:
      run:
        working-directory: aws/terraform

    steps:
      - uses: actions/checkout@v4

      - name: Terraform context (prod / ${{ matrix.key }})
        run: |
          echo "TF_ENV=prod" >> "$GITHUB_ENV"
          echo "TF_VAR_environment=prod" >> "$GITHUB_ENV"
          echo "TF_VAR_account_key=${{ matrix.key }}" >> "$GITHUB_ENV"
          echo "STATE_PREFIX=terraform/aws/prod/${{ matrix.key }}" >> "$GITHUB_ENV"
          echo "AWS_ROLE_TO_ASSUME=${{ matrix.role_arn }}" >> "$GITHUB_ENV"

      - name: GCS state bucket (from config)
        run: |
          B="$(ruby "$GITHUB_WORKSPACE/scripts/ci/terraform-from-config.rb" gcp-state-bucket main)"
          echo "GCP_TF_STATE_BUCKET=${B}" >> "$GITHUB_ENV"

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION || 'ap-southeast-2' }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Refuse local state files in workspace
        run: |
          shopt -s nullglob
          files=( *.tfstate* )
          if [ ${#files[@]} -gt 0 ]; then
            echo "terraform.tfstate* must not be present; state must stay in GCS only."
            ls -la "${files[@]}"
            exit 1
          fi

      - name: Require GCS state bucket
        run: |
          if [ -z "${GCP_TF_STATE_BUCKET:-}" ]; then
            echo "Missing prod state bucket in config/terraform-environments.yaml (environments.prod.gcp.state_bucket)."
            exit 1
          fi

      - name: Terraform Init
        run: |
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${GCP_TF_STATE_BUCKET}" \
            -backend-config="prefix=${STATE_PREFIX}"

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve -no-color

      - name: Confirm no local state was written
        run: |
          if [ -f terraform.tfstate ] || [ -f terraform.tfstate.backup ]; then
            echo "Local state file present after apply; GCS backend must be used exclusively."
            exit 1
          fi
